name: Keep backend warm

# Render's free tier spins the backend down after ~15 minutes of no
# requests, so the first request afterward eats a ~50s cold start (see
# README's "Known limitations"). Pinging /health well inside that window
# keeps it warm. GitHub's own schedule trigger isn't guaranteed to fire
# at the exact minute — it can slip by a few minutes on a quiet repo —
# so this runs every 10 minutes, not right at the 15-minute edge, to
# leave real buffer against that drift.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          # --max-time covers the cold-start case itself (a sleeping
          # instance can take up to ~50s to respond to the request that
          # wakes it) — a failed ping only means this run caught it mid
          # cold-start, not that the backend is actually down, so it
          # doesn't fail the job.
          curl --fail --silent --show-error --max-time 60 "${{ vars.RENDER_BACKEND_URL || 'https://bazar-ai.onrender.com' }}/health" \
            || echo "Ping didn't get a response in time — likely caught the backend mid cold-start, not a real failure."

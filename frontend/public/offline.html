<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bazar AI — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f7f6f1;
        color: #14161a;
        font-family: system-ui, -apple-system, sans-serif;
        text-align: center;
        padding: 24px;
      }
      .card {
        max-width: 360px;
      }
      h1 {
        color: #1f5c3f;
        font-size: 1.5rem;
        margin-bottom: 8px;
      }
      p {
        line-height: 1.6;
        color: #4a4d52;
      }
      button {
        margin-top: 20px;
        background: #1f5c3f;
        color: white;
        border: none;
        padding: 10px 20px;
        font-size: 1rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>Bazar AI needs a connection to fetch products and talk to Bazar Buddy. Reconnect and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
